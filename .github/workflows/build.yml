name: PNGTuber Pro Windows Build

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:


jobs:

  build-windows:

    runs-on: windows-latest


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip


    - name: Install dependencies
      run: |
        pip install pygame
        pip install pillow
        pip install numpy
        pip install sounddevice
        pip install pyinstaller


    - name: Check project files
      run: |
        dir
        dir PNGTuberPro
        dir PLIMBCreator


    - name: Build PNGTuber Pro EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name PNGTuberPro PNGTuberPro/main.py


    - name: Build PLIMB Creator EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name PLIMBCreator PLIMBCreator/creator.py


    - name: Copy extra files
      run: |
        mkdir release
        copy dist\PNGTuberPro.exe release\
        copy dist\PLIMBCreator.exe release\


    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:

        name: PNGTuber-Pro-Windows

        path: release/