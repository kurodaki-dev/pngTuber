name: PNGTuber Windows Build


on:
  push:
    branches:
      - main
      - master



jobs:


  build:


    runs-on: windows-latest



    steps:


    - uses: actions/checkout@v4



    - uses: actions/setup-python@v5

      with:

        python-version: "3.11"



    - name: Install

      run: |

        pip install pygame pillow numpy sounddevice pyinstaller



    - name: Build PNGTuber

      run: |

        pyinstaller ^
        --noconfirm ^
        --onefile ^
        --windowed ^
        --name PNGTuberPro ^
        PNGTuberPro/main.py



    - name: Build Creator

      run: |

        pyinstaller ^
        --noconfirm ^
        --onefile ^
        --windowed ^
        --name PLIMBCreator ^
        PLIMBCreator/creator.py



    - name: Upload

      uses: actions/upload-artifact@v4

      with:

        name: PNGTuber-Windows

        path: |
          dist/PNGTuberPro.exe
          dist/PLIMBCreator.exe