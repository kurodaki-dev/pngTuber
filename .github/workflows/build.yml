name: Multi-Platform Build (Windows & Android)

on:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Dependencies
      run: |
        pip install pygame Pillow sounddevice numpy pyinstaller
    - name: Build Windows EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name="PNGTuberPro_Windows" main_windows.py
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PNGTuber-Windows
        path: dist/PNGTuberPro_Windows.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android SDK/NDK Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-writer

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython Pillow git+https://github.com/kivy/plyer.git

    - name: Configure Buildozer Spec & Assets
      run: |
        python -c "from PIL import Image; img = Image.new('RGB', (512, 512), (255, 255, 255)); img.save('icon.png')"
        python -c "from PIL import Image; img = Image.new('RGB', (1024, 1024), (0, 255, 0)); img.save('presplash.png')"

        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/title = My Application/title = PNGTuber Mobile/' buildozer.spec
          sed -i 's/package.name = myapp/package.name = pngtubermobile/' buildozer.spec
          sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png/' buildozer.spec
          sed -i 's/#requirements = python3,kivy/requirements = python3,pygame/' buildozer.spec
          sed -i 's/source.main = main.py/source.main = main_android.py/' buildozer.spec
          
          # Forçage des versions d'API et téléchargement des cmdline-tools modernes
          sed -i 's/#android.api = 33/android.api = 33/' buildozer.spec
          sed -i 's/#android.minapi = 21/android.minapi = 21/' buildozer.spec
          sed -i 's/#android.ndk_api = 21/android.ndk_api = 21/' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          
          # Ligne magique : on force Buildozer à prendre des outils de ligne de commande récents
          sed -i 's/#android.sdk_tools_version = .*/android.sdk_tools_version = 9477386/' buildozer.spec
          
          sed -i 's/icon.filename = %(source.dir)s\/data\/icon.png/icon.filename = icon.png/' buildozer.spec
          sed -i 's/presplash.filename = %(source.dir)s\/data\/presplash.png/presplash.filename = presplash.png/' buildozer.spec
        fi

    - name: Patch SDK Paths & Accept Licenses
      run: |
        # 1. On pré-crée l'arborescence que Buildozer va utiliser pour son SDK isolé
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        
        # 2. On lie le sdkmanager global de GitHub Actions pour l'injecter chez Buildozer
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager || true
        
        # 3. TRICHE : Si Buildozer cherche dans l'ancien dossier "tools/bin", le lien symbolique le redirige vers le vrai sdkmanager fonctionnel
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true

        # 4. On valide les licences partout
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true

    - name: Run Buildozer
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PNGTuber-Android
        path: bin/*.apk
        